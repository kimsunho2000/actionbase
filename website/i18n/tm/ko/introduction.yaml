entries:
  - source: Introduction
    target: 소개
    context: frontmatter:title
  - source: Introduction to Actionbase
    target: Actionbase 소개
    context: frontmatter:description
  - source: Actionbase is a database for serving user interactions. It is designed to serve interaction-driven data in real time and is production-proven across Kakao services.
    target: Actionbase는 사용자 인터랙션을 제공하는 데이터베이스입니다. 이 시스템은 실시간 인터랙션 기반 데이터를 제공하도록 설계되었으며, 카카오 서비스 전반에서 프로덕션 환경에서 검증되었습니다.
    context: paragraph
  - source: Actionbase serves interaction-derived data—**likes**, **recent views**, **follows**, **reactions**—in real time.
    target: Actionbase는 **좋아요**, **최근 조회**, **팔로우**, **반응**과 같은 인터랙션 파생 데이터를 실시간으로 제공합니다.
    context: paragraph
  - source: 'An interaction is modeled as: **who** did **what** to which **target**.'
    target: 하나의 인터랙션은 **누가** **무엇을** **어떤 타겟**에 대해 수행했는지로 모델링됩니다.
    context: paragraph
  - source: Actionbase materializes read-optimized structures at write time. Reads use bounded access patterns (GET, COUNT, SCAN) without expensive computation.
    target: Actionbase는 쓰기 시점에 읽기 최적화 구조를 생성합니다. 읽기 작업은 비용이 큰 연산 없이 제한된 접근 패턴(GET, COUNT, SCAN)을 사용합니다.
    context: paragraph
  - source: When backed by HBase, Actionbase inherits durability and horizontal scalability.
    target: HBase를 백엔드로 사용할 경우, Actionbase는 내구성과 수평 확장성을 그대로 물려받습니다.
    context: paragraph
  - source: Focus
    target: 집중
    context: heading
  - source: Focuses on | Explicitly avoids
    target: 주요 초점 | 명시적으로 배제하는 영역
    context: table
  - source: Real-time user interactions (likes, views, follows) | General-purpose graph queries
    target: 실시간 사용자 인터랙션(좋아요, 조회, 팔로우) | 범용 그래프 쿼리
    context: table
  - source: Bounded access patterns (GET, COUNT, SCAN) | Unbounded traversal or analytics
    target: 제한된 접근 패턴(GET, COUNT, SCAN) | 무제한 탐색 또는 분석
    context: table
  - source: Continuous writes, immediate reads | Batch ingestion or deferred indexing
    target: 지속적인 쓰기 및 즉시 읽기 | 배치 수집 또는 지연 인덱스
    context: table
  - source: WAL/CDC to Kafka (yours or ours) | Owning downstream processing
    target: WAL/CDC를 Kafka로 연동(자체 또는 공동 사용) | 다운스트림 처리 소유
    context: table
  - source: Pluggable storage (HBase now, others planned) | Building yet another storage engine
    target: 플러그형 스토리지(HBase 현재, 향후 추가 예정) | 또 다른 스토리지 엔진 구축
    context: table
  - source: Storage Backend
    target: 기본 스토리지 백엔드
    context: heading
  - source: Actionbase currently uses HBase as its primary storage backend. Lighter backends are [planned](https://github.com/kakao/actionbase/blob/main/ROADMAP.md#exploring) for smaller deployments.
    target: Actionbase는 현재 HBase를 기본 스토리지 백엔드로 사용합니다. 더 가벼운 백엔드는 [계획](https://github.com/kakao/actionbase/blob/main/ROADMAP.md#exploring) 중이며, 소규모 배포를 위한 옵션도 준비 중입니다.
    context: paragraph
  - source: Production Usage
    target: 프로덕션 사용 사례
    context: heading
  - source: Used at Kakao services—primarily [KakaoTalk Gift](https://gift.kakao.com/home)—handling over a million requests per minute. Running in stable production for years.
    target: 카카오 서비스에서 사용—주로 [카카오 선물하기](https://gift.kakao.com/home)에서—분당 백만 건이 넘는 요청을 처리합니다. 수년간 안정적으로 프로덕션 환경에서 운영 중입니다.
    context: paragraph
