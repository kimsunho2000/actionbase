services:
  hbase:
    build: .
    image: hbase-actionbase-dev:2.5.12
    container_name: hbase-actionbase-dev
    hostname: hbase
    ports:
      - "16000:16000"
      - "16010:16010"
      - "16020:16020"
      - "16030:16030"
      - "2181:2181"
    volumes:
      - ./data/hbase:/data/hbase
      - ./data/zookeeper:/data/zookeeper
      - ./logs:/opt/hbase/logs
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16010"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s