- name: Create table
  description: Create user_likes table with schema
  command: |
    load table
    --database social
    --name user_likes
    --data '{
      "desc": "user likes table",
      "type": "INDEXED",
      "schema": {
        "src": {
          "type": "STRING",
          "desc": "userId"
        },
        "tgt": {
          "type": "LONG",
          "desc": "postId"
        },
        "fields": [
          {
            "name": "createdAt",
            "type": "LONG",
            "desc": "createdAt",
            "nullable": false
          }
        ]
      },
      "dirType": "BOTH",
      "indices": [
        {
          "name": "created_at_desc",
          "fields": [
            {
              "name": "createdAt",
              "order": "DESC"
            }
          ],
          "desc": "order by createdAt"
        }
      ],
      "storage": "datastore://guides/user_likes",
      "event": false,
      "readOnly": false,
      "mode": "SYNC"
    }'

