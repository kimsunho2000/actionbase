- name: Create database
  description: Create social database
  command: |
    create database
    --name social
    --data '{
     "comment": "social database"
    }'

- name: Create table
  description: Create user_posts table with schema
  command: |
    create table
    --database social
    --name user_posts
    --data '{
     "desc": "user posts table",
     "type": "INDEXED",
     "schema": {
       "src": {
         "type": "STRING",
         "desc": "userId"
       },
       "tgt": {
         "type": "LONG",
         "desc": "postId"
       },
       "fields": [
         {
           "name": "createdAt",
           "type": "LONG",
           "desc": "createdAt",
           "nullable": false
         }
       ]
     },
     "dirType": "BOTH",
     "indices": [
       {
         "name": "created_at_desc",
         "fields": [
           {
             "name": "createdAt",
             "order": "DESC"
           }
         ],
         "desc": "order by createdAt"
       }
     ],
     "storage": "datastore://guides/user_posts",
     "event": false,
     "readOnly": false,
     "mode": "SYNC"
    }'

- name: j4rami creates Post1
  description: Insert edge j4rami → Post1
  command: |
    create edges
    --database social
    --table user_posts
    --data '{
      "mutations": [
        {
          "type": "INSERT",
          "edge": {
            "version": __CURRENT_TIMESTAMP__,
            "source": "j4rami",
            "target": 1,
            "properties": {
              "createdAt": __CURRENT_TIMESTAMP__
            }
          }
        }
      ]
    }'

